<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>Rucio</title>
    <link data-trunk rel="icon" href="favicon.svg"/>
    <link data-trunk rel="rust"/>

    <!-- PWA: copy the manifest, service worker and icons into dist/ so the
         embedded server (rust-embed) ships them, then wire them up. -->
    <link data-trunk rel="copy-file" href="manifest.webmanifest"/>
    <link data-trunk rel="copy-file" href="sw.js"/>
    <link data-trunk rel="copy-file" href="icon-192.png"/>
    <link data-trunk rel="copy-file" href="icon-512.png"/>
    <link data-trunk rel="copy-file" href="apple-touch-icon.png"/>
    <!-- use-credentials: send the basic-auth/cookie credentials when fetching
         the manifest, else a proxy with HTTP auth in front returns 401 and the
         app is not installable. -->
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials"/>
    <meta name="theme-color" content="#4f6ef7"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Rucio"/>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
    <script>
        // Register the service worker (installability + fast shell load).
        // Requires a secure context: works on localhost or behind HTTPS.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
    <style>
        /* ── Theme variables ────────────────────────────────────────────── */
        /* Default = light. Dark applies when data-theme="dark" is set on
           <html>, or automatically via media query when no explicit theme
           is set (auto mode). The FOUC-prevention script in <head> sets
           the attribute before first paint when a preference is stored.   */

        :root {
            /* Tell the UA to render native controls (the <select> popup,
               scrollbars, form fields) in the matching scheme. Without this
               Chromium draws the dropdown in light mode over our dark
               surfaces, which breaks the selected-option highlight so it only
               covers the text width instead of the full row. */
            color-scheme: light;
            --font-base: 17px;
            --bg:        #f8fafc;
            --surface:   #ffffff;
            --raised:    #f1f5f9;
            --border:    #e2e8f0;
            --text:      #0f172a;
            --text-2:    #475569;
            --text-3:    #64748b;
            --text-4:    #94a3b8;
            --accent:    #4f6ef7;
            --accent-2:  #3b5bdb;
            --accent-fg: #ffffff;
            --mono:      #334155;
            --row-hover: #f1f5f9;
            --row-sel:   #e0e7ff;
            --bar-track: #e2e8f0;
            --ws-off:    #94a3b8;
            /* state badge colours (bg / fg) */
            --sa: #dbeafe; --sa-fg: #1d4ed8;  /* active / downloading */
            --sd: #dcfce7; --sd-fg: #15803d;  /* done / completed     */
            --sf: #fee2e2; --sf-fg: #dc2626;  /* failed / error       */
            --st: #ffedd5; --st-fg: #ea580c;  /* stalled              */
            --sp: #f3e8ff; --sp-fg: #7c3aed;  /* paused               */
            --sn: #f1f5f9; --sn-fg: #475569;  /* neutral (queued, …)  */
        }

        /* Explicit dark */
        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg:        #0f0f1a;
            --surface:   #1a1a2e;
            --raised:    #1e2235;
            --border:    #2d2d4e;
            --text:      #e2e8f0;
            --text-2:    #94a3b8;
            --text-3:    #64748b;
            --text-4:    #475569;
            --accent:    #7c93f0;
            --accent-2:  #a5b4fc;
            --accent-fg: #0f0f1a;
            --mono:      #cbd5e1;
            --row-hover: #151525;
            --row-sel:   #1a2240;
            --bar-track: #2d2d4e;
            --ws-off:    #475569;
            --sa: #1e3a5f; --sa-fg: #93c5fd;
            --sd: #14532d; --sd-fg: #86efac;
            --sf: #450a0a; --sf-fg: #fca5a5;
            --st: #431407; --st-fg: #fdba74;
            --sp: #3b0764; --sp-fg: #d8b4fe;
            --sn: #1e293b; --sn-fg: #94a3b8;
        }

        /* Auto-dark: follow system preference when no explicit theme is set */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                color-scheme: dark;
                --bg:        #0f0f1a;
                --surface:   #1a1a2e;
                --raised:    #1e2235;
                --border:    #2d2d4e;
                --text:      #e2e8f0;
                --text-2:    #94a3b8;
                --text-3:    #64748b;
                --text-4:    #475569;
                --accent:    #7c93f0;
                --accent-2:  #a5b4fc;
                --accent-fg: #0f0f1a;
                --mono:      #cbd5e1;
                --row-hover: #151525;
                --row-sel:   #1a2240;
                --bar-track: #2d2d4e;
                --ws-off:    #475569;
                --sa: #1e3a5f; --sa-fg: #93c5fd;
                --sd: #14532d; --sd-fg: #86efac;
                --sf: #450a0a; --sf-fg: #fca5a5;
                --st: #431407; --st-fg: #fdba74;
                --sp: #3b0764; --sp-fg: #d8b4fe;
                --sn: #1e293b; --sn-fg: #94a3b8;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            font-size: var(--font-base);
            overflow-x: hidden; /* prevent horizontal overflow from expanding
                                   the scroll area and making fixed elements
                                   drift on narrow screens */
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh; /* dvh tracks the mobile browser UI; vh fallback */
            overflow-x: hidden;
            /* Disable pull-to-refresh: as an installed PWA the gesture reloads
               the whole WASM app (expensive, and it glitches the standalone
               viewport, leaving a gap the size of the pulled distance). Live
               data already streams over the WebSocket, so a manual refresh is
               not needed. */
            overscroll-behavior-y: contain;
        }

        /* ── Layout ──────────────────────────────────────────────────────── */

        /* 100vh on mobile includes the area behind the address bar, so the
           layout ends up taller than the visible viewport and the bottom spills
           under it. dvh (dynamic viewport height) tracks the actual visible
           area; keep vh as the fallback for older engines. */
        .layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-toolbar { padding: 1.25rem 1.5rem 0.875rem; flex-shrink: 0; }
        .tab-scroll  { flex: 1; overflow-y: auto; padding: 0 1.5rem 1.25rem; }

        /* ── Topbar ──────────────────────────────────────────────────────── */

        .topbar {
            display: flex; align-items: stretch; height: 48px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand {
            display: flex; align-items: center;
            padding: 0 1.25rem 0 1.5rem;
            font-size: 1.0625rem; font-weight: 700;
            letter-spacing: 0.05em; color: var(--accent); white-space: nowrap;
        }

        /* ── Tabs ────────────────────────────────────────────────────────── */

        .tabs { display: flex; align-items: stretch; flex: 1; }

        .tab {
            display: flex; align-items: center;
            padding: 0 1.125rem;
            background: transparent; border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-3); cursor: pointer;
            font-size: 0.8125rem; font-family: inherit;
            transition: color 0.15s; white-space: nowrap;
        }
        .tab:hover { color: var(--text-2); }
        .tab.active { color: var(--text); border-bottom-color: var(--accent); }

        /* ── Navigation drawer (narrow screens) ──────────────────────────── */

        /* Hamburger that opens the sidebar; hidden on wide screens. */
        .nav-toggle {
            display: none; align-items: center; justify-content: center;
            padding: 0 0.75rem; background: transparent; border: none;
            color: var(--text-2); cursor: pointer;
        }
        .nav-toggle .icon { width: 1.375rem; height: 1.375rem; }

        .sidebar-backdrop {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,.4); display: flex;
        }
        .sidebar {
            width: 240px; max-width: 80vw; height: 100%;
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: 2px 0 16px rgba(0,0,0,.25);
            animation: sidebar-in 0.15s ease-out;
        }
        @keyframes sidebar-in {
            from { transform: translateX(-100%); }
            to   { transform: translateX(0); }
        }
        .sidebar-logo {
            display: flex; align-items: center; height: 48px; padding: 0 1.5rem;
            font-size: 1.0625rem; font-weight: 700; letter-spacing: 0.05em;
            color: var(--accent);
        }
        .sidebar-sep { height: 1px; background: var(--border); margin-bottom: 0.25rem; }
        .sidebar-item {
            display: flex; align-items: center; padding: 0.75rem 1.5rem;
            background: transparent; border: none; border-left: 3px solid transparent;
            color: var(--text-2); cursor: pointer; text-align: left;
            font-size: 0.9rem; font-family: inherit;
            transition: background 0.1s, color 0.1s;
        }
        .sidebar-item:hover { background: var(--row-hover); color: var(--text); }
        .sidebar-item.active {
            color: var(--text); border-left-color: var(--accent); background: var(--row-sel);
        }

        @media (max-width: 640px) {
            .tabs { display: none; }
            .nav-toggle { display: flex; }
            /* The hamburger replaces the brand here (the logo lives in the
               drawer); push the connection/menu icons back to the right since
               the flex:1 tabs that used to do it are now hidden. */
            .brand { display: none; }
            .menu-wrap { margin-left: auto; }
        }

        /* ── Menu ────────────────────────────────────────────────────────── */

        .menu-wrap {
            position: relative; display: flex; align-items: center;
            gap: 0.5rem; padding: 0 1rem;
        }

        .ws-icon { width: 15px; height: 15px; flex-shrink: 0; }
        .ws-icon-on  { color: #22c55e; filter: drop-shadow(0 0 3px #22c55e88); }
        .ws-icon-off { color: #f87171; }

        .menu-btn {
            background: transparent; border: none; color: var(--text-3);
            cursor: pointer; display: flex; align-items: center;
            padding: 0.25rem 0.375rem; font-family: inherit;
            transition: color 0.15s;
        }
        .menu-btn:hover { color: var(--text); }

        .bell-btn {
            position: relative;
            background: transparent; border: none; color: var(--text-3);
            cursor: pointer; display: flex; align-items: center;
            padding: 0.25rem 0.375rem; font-family: inherit;
            transition: color 0.15s;
        }
        .bell-btn:hover { color: var(--text); }
        .bell-badge {
            position: absolute; top: -1px; right: -1px;
            min-width: 15px; height: 15px; padding: 0 3px; box-sizing: border-box;
            border-radius: 999px; background: #ef4444; color: #fff;
            font-size: 0.625rem; line-height: 15px; font-weight: 700;
            text-align: center;
        }

        .dropdown {
            position: absolute; top: calc(100% + 4px); right: 0.75rem;
            background: var(--raised); border: 1px solid var(--border);
            border-radius: 0.5rem; min-width: 224px; z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,.25);
            /* Cap to the viewport below the topbar and scroll inside, so a tall
               menu on a short screen (e.g. a phone in landscape) doesn't spill
               off the bottom and push a page-level scrollbar. */
            max-height: calc(100vh - 64px);
            max-height: calc(100dvh - 64px);
            overflow-y: auto;
        }
        .dropdown-item {
            display: block; width: 100%; text-align: left;
            padding: 0.625rem 1rem; background: transparent; border: none;
            color: var(--text); cursor: pointer;
            font-size: 0.8125rem; font-family: inherit; transition: background 0.1s;
        }
        .dropdown-item:hover:not(:disabled) { background: var(--border); }
        .dropdown-item:disabled { opacity: 0.4; cursor: default; }
        .dropdown-sep { height: 1px; background: var(--border); margin: 0.25rem 0; }
        /* Toggle row: label left, state pill right. */
        .dropdown-toggle {
            display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
        }
        .toggle-pill {
            font-size: 0.7rem; font-weight: 600;
            padding: 0.05rem 0.45rem; border-radius: 9999px;
            background: var(--raised); color: var(--text-4);
        }
        .toggle-pill.toggle-on { background: var(--sa); color: var(--sa-fg); }
        .toggle-clickable { cursor: pointer; user-select: none; }
        .toggle-disabled { opacity: .4; pointer-events: none; }

        /* Menu section: a titled group of quick settings in the dropdown. */
        .menu-section-title {
            padding: 0.25rem 1rem; font-size: 0.6875rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-4);
        }
        .menu-limit-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem; padding: 0.25rem 1rem;
        }
        .menu-limit-label { font-size: 0.8125rem; color: var(--text); }
        .menu-select {
            padding: 0.2rem 0.4rem; background: var(--raised);
            border: 1px solid var(--border); border-radius: 0.25rem;
            color: var(--text); font-size: 0.75rem; font-family: inherit; cursor: pointer;
        }
        .menu-temp-info {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.375rem 1rem; font-size: 0.75rem; color: var(--text-3);
            white-space: nowrap;
        }
        .menu-temp-info .icon { width: 0.95rem; height: 0.95rem; color: var(--text-4); }

        /* ── Theme picker ────────────────────────────────────────────────── */

        .theme-picker {
            display: flex; align-items: center; justify-content: center;
            gap: 0.5rem; padding: 0.5rem 0.75rem;
        }
        .theme-btn {
            display: flex; align-items: center; justify-content: center;
            width: 2rem; height: 2rem; border-radius: 0.375rem;
            background: transparent; border: 1px solid transparent;
            color: var(--text-3); cursor: pointer;
            transition: background 0.1s, color 0.1s, border-color 0.1s;
        }
        .theme-btn:hover { background: var(--border); color: var(--text); }
        .theme-active { background: var(--border); border-color: var(--accent); color: var(--accent); }

        /* ── Overlay ─────────────────────────────────────────────────────── */

        .overlay-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.35); z-index: 200;
        }
        .overlay {
            position: fixed; top: 56px;
            left: 50%; transform: translateX(-50%);
            width: min(560px, calc(100vw - 2rem));
            max-height: calc(100vh - 72px);
            max-height: calc(100dvh - 72px);
            /* The overlay itself doesn't scroll; only .overlay-body does, so the
               scrollbar stays inside the body and never crosses the fixed
               header. overflow:hidden also keeps the rounded corners clean. */
            display: flex; flex-direction: column; overflow: hidden;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.5rem; box-shadow: 0 12px 36px rgba(0,0,0,.2);
            z-index: 201;
        }
        .overlay-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border);
            background: var(--surface); flex-shrink: 0;
        }
        .overlay-title { font-size: 0.8125rem; font-weight: 600; color: var(--text); }
        .overlay-close {
            display: inline-flex; align-items: center; justify-content: center;
            background: transparent; border: none; color: var(--text-4);
            cursor: pointer; padding: 0.125rem; border-radius: 0.25rem;
            transition: color 0.15s, background 0.1s;
        }
        .overlay-close .icon { width: 1.125rem; height: 1.125rem; }
        .overlay-close:hover { color: var(--text); background: var(--row-hover); }
        .overlay-body { padding: 1rem 1.25rem; flex: 1; overflow-y: auto; }

        /* ── Notification centre ─────────────────────────────────────────── */
        /* A right-edge slideover (not a centred modal), like an OS notification
           centre — aligned with the header bell. Reuses .overlay-header /
           .overlay-body for its inner chrome. */
        .notif-drawer-backdrop {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,.4); display: flex; justify-content: flex-end;
        }
        .notif-drawer {
            width: 380px; max-width: 90vw; height: 100%;
            background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: -2px 0 16px rgba(0,0,0,.25);
            animation: notif-drawer-in 0.15s ease-out;
        }
        @keyframes notif-drawer-in {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }
        .notif-clear {
            margin-left: auto; margin-right: 0.625rem;
            background: transparent; border: none; color: var(--accent);
            cursor: pointer; font-size: 0.75rem; font-family: inherit; padding: 0;
        }
        .notif-clear:hover { text-decoration: underline; }
        .notif-empty {
            color: var(--text-3); font-style: italic; text-align: center;
            padding: 1.5rem 0;
        }
        .notif-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
        .notif-item {
            display: flex; align-items: flex-start; gap: 0.625rem;
            padding: 0.625rem 0.125rem; border-bottom: 1px solid var(--border);
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-icon {
            color: var(--accent); flex-shrink: 0; display: flex; margin-top: 0.1rem;
        }
        .notif-icon .icon { width: 1.125rem; height: 1.125rem; }
        .notif-text { flex: 1; min-width: 0; }
        .notif-title { font-size: 0.8125rem; font-weight: 600; color: var(--text); }
        .notif-body {
            font-size: 0.75rem; color: var(--text-2); word-break: break-word;
        }
        .notif-time { font-size: 0.6875rem; color: var(--text-3); margin-top: 0.15rem; }
        .notif-del {
            background: transparent; border: none; color: var(--text-3);
            cursor: pointer; display: flex; flex-shrink: 0; padding: 0.125rem;
        }
        .notif-del:hover { color: #ef4444; }
        .notif-del .icon { width: 0.95rem; height: 0.95rem; }

        /* Webhooks editor (Notifications settings tab) */
        .webhook-row {
            border: 1px solid var(--border); border-radius: 6px;
            padding: 0.625rem; margin-bottom: 0.625rem;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .webhook-row-head { display: flex; align-items: center; gap: 0.5rem; }
        /* Wider than config-input-sm so "Telegram" fits when selected. */
        .webhook-format {
            width: 150px; padding: 0.3rem 0.5rem; background: var(--raised);
            border: 1px solid var(--border); border-radius: 0.25rem;
            color: var(--text); font-size: 0.8125rem; font-family: inherit; outline: none;
        }
        .webhook-format:focus { border-color: var(--accent); }
        /* The text fields (URL, secret, content-type) span the row width. */
        .webhook-row .config-input { width: 100%; box-sizing: border-box; }
        .webhook-test { font-size: 0.75rem; color: var(--text-3); }
        .webhook-test-ok { color: #22c55e; }
        .webhook-test-err { color: #ef4444; }
        .webhook-del {
            margin-left: auto; background: transparent; border: none;
            color: var(--text-3); cursor: pointer; display: flex; padding: 0.125rem;
        }
        .webhook-del:hover { color: #ef4444; }
        .webhook-del .icon { width: 1rem; height: 1rem; }
        .webhook-kinds {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            font-size: 0.8125rem;
        }
        .webhook-check {
            display: flex; align-items: center; gap: 0.3rem; cursor: pointer;
            color: var(--text-2);
        }
        .webhook-hint { color: var(--text-3); font-size: 0.75rem; }
        .webhook-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.25rem; }
        /* Category editor rows (reuses .webhook-del / .webhook-actions). */
        .cat-row {
            border: 1px solid var(--border); border-radius: 6px;
            padding: 0.625rem; margin-bottom: 0.625rem;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .cat-row-head { display: flex; align-items: center; gap: 0.5rem; }
        .cat-color {
            width: 2rem; height: 2rem; padding: 0; flex: none; cursor: pointer;
            border: 1px solid var(--border); border-radius: 0.25rem; background: var(--raised);
        }
        .cat-name { flex: 1; min-width: 0; }
        .cat-status { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; }
        .cat-status-ok { color: #22c55e; }
        .cat-status-err { color: #ef4444; }
        .cat-row .config-input { width: 100%; box-sizing: border-box; }
        /* Category selector in the Add-downloads modal. */
        .add-cat-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.625rem; }
        .add-cat-row .config-label { margin: 0; flex: none; }
        /* The selector fills the remaining width so it lines up with the textarea
           above; min-width:0 lets it shrink (and clip a long name) instead of
           overflowing, and overrides the shared 14rem cap. */
        .add-cat-row .dl-filter-select { flex: 1; min-width: 0; max-width: none; }

        /* ── Panel contents ──────────────────────────────────────────────── */

        .panel-dl {
            display: grid; grid-template-columns: max-content 1fr;
            gap: 0.5rem 1.25rem; align-items: baseline;
        }
        dt { color: var(--text-3); font-size: 0.8125rem; white-space: nowrap; }
        dd { font-size: 0.8125rem; }

        .section-label {
            font-size: 0.6875rem; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-4);
            margin: 0.875rem 0 0.375rem;
        }
        .section-label:first-child { margin-top: 0; }

        .addr-list { list-style: none; display: flex; flex-direction: column; gap: 0.25rem; }
        .addr-list li {
            font-family: monospace; font-size: 0.6875rem; color: var(--text-2);
            background: var(--bg); padding: 0.25rem 0.5rem;
            border-radius: 0.25rem; word-break: break-all;
        }

        /* ── Peers panel ─────────────────────────────────────────────────── */
        .panel-note {
            font-size: 0.6875rem; color: var(--text-3); line-height: 1.4;
            margin: 0 0 0.75rem;
        }
        .peer-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
        .peer-item {
            display: flex; flex-direction: column; gap: 0.2rem;
            padding: 0.5rem 0; border-bottom: 1px solid var(--raised);
        }
        .peer-item:last-child { border-bottom: none; }
        .peer-head { display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
        .peer-id {
            font-size: 0.75rem; color: var(--text-2);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
        }
        .peer-addr {
            font-family: monospace; font-size: 0.625rem; color: var(--text-3);
            word-break: break-all;
        }
        /* Per-peer download rate in the download-detail "Downloading from" list. */
        .dl-peer-rate {
            font-size: 0.75rem; font-weight: 600; color: var(--sd-fg);
            min-width: 4.5rem; font-variant-numeric: tabular-nums; flex-shrink: 0;
        }

        /* ── Toolbar ─────────────────────────────────────────────────────── */

        .dl-toolbar {
            display: flex; gap: 0.375rem;
            padding-bottom: 0.875rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }

        .icon { width: 1rem; height: 1rem; flex-shrink: 0; }

        .toolbar-btn {
            display: inline-flex; align-items: center; gap: 0.3125rem;
            padding: 0.3125rem 0.625rem;
            background: var(--raised); border: 1px solid var(--border);
            border-radius: 0.25rem; color: var(--text-2);
            font-size: 0.8125rem; font-family: inherit; cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .toolbar-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
        .toolbar-btn:disabled { opacity: 0.35; cursor: default; }
        .toolbar-btn-danger:not(:disabled) { color: var(--sf-fg); border-color: var(--sf); }
        .toolbar-btn-danger:hover:not(:disabled) { background: var(--sf); }

        @media (max-width: 540px) {
            .dl-toolbar { gap: 0.25rem; }
            .toolbar-btn {
                flex: 1; flex-direction: column; gap: 2px;
                padding: 0.375rem 0.25rem; font-size: 0.6875rem;
            }
            .toolbar-btn .icon { width: 1.125rem; height: 1.125rem; }
        }

        /* ── Modal ───────────────────────────────────────────────────────── */

        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.4); z-index: 300;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.5rem; width: 480px; max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,.2);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 0.8125rem; font-weight: 600; color: var(--text); }
        .modal-body { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .modal-footer {
            display: flex; justify-content: flex-end; gap: 0.5rem;
            padding: 0.875rem 1.25rem; border-top: 1px solid var(--border);
        }
        /* ── Configuration modal ─────────────────────────────────────────── */
        .modal-config { width: 560px; }
        .modal-config .modal-body { max-height: 60vh; overflow-y: auto; }
        .config-input:disabled, .config-textarea:disabled {
            opacity: 0.5; cursor: not-allowed;
        }
        .config-tabs {
            display: flex; gap: 0.25rem;
            padding: 0 1.25rem; border-bottom: 1px solid var(--border);
            /* Scroll horizontally instead of overflowing when the tabs don't
               fit (small mobile screens). overflow-y must be explicit hidden:
               setting overflow-x:auto would otherwise make y compute to auto
               too, and the tabs' -1px overlap triggers a stray vertical bar. */
            overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap;
            /* Hide the scrollbar (the tabs scroll by swipe/drag); keeps the
               strip clean instead of showing a bar under the tabs. */
            scrollbar-width: none; -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }
        .config-tabs::-webkit-scrollbar { display: none; }
        .config-tab {
            padding: 0.5rem 0.75rem; background: transparent; border: none;
            border-bottom: 2px solid transparent; margin-bottom: -1px;
            color: var(--text-3); cursor: pointer;
            font-size: 0.8125rem; font-family: inherit;
            flex: 0 0 auto; white-space: nowrap;
        }
        .config-tab:hover { color: var(--text); }
        .config-tab-active { color: var(--text); border-bottom-color: var(--accent); }

        .config-section { display: flex; flex-direction: column; gap: 0.625rem; }
        .config-hint { font-size: 0.7rem; color: var(--text-4); margin-top: 0.25rem; }
        .config-field {
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        }
        .config-field-col { flex-direction: column; align-items: stretch; gap: 0.3rem; }
        .config-label { font-size: 0.8125rem; color: var(--text-2); white-space: nowrap; }
        .config-input, .config-textarea {
            padding: 0.3rem 0.5rem; background: var(--raised);
            border: 1px solid var(--border); border-radius: 0.25rem;
            color: var(--text); font-size: 0.8125rem; font-family: inherit; outline: none;
        }
        .config-input { width: 180px; }
        .config-input:focus, .config-textarea:focus { border-color: var(--accent); }
        .config-input-sm { width: 80px; }
        .config-textarea { width: 100%; resize: vertical; font-family: 'Cascadia Code', monospace; font-size: 0.75rem; }
        .config-pending {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.625rem; border-radius: 0.375rem;
            background: var(--sp); color: var(--sp-fg); font-size: 0.75rem;
        }
        .config-pending .icon { width: 0.875rem; height: 0.875rem; flex-shrink: 0; }

        /* Narrow screens: a long label (e.g. "Temp download limit") would push
           the input out of the row, so stack label over a full-width input.
           Declared after the base rules so it wins the cascade. */
        @media (max-width: 480px) {
            /* .config-field-keep stays inline (e.g. the small eMule toggle). */
            .config-field:not(.config-field-keep) {
                flex-direction: column; align-items: stretch; gap: 0.3rem;
            }
            .config-label { white-space: normal; }
            .config-input, .config-input-sm { width: 100%; }
        }

        .modal-hint { font-size: 0.75rem; color: var(--text-3); }
        .modal-hint code {
            background: var(--bg); padding: 0.1rem 0.3rem;
            border-radius: 3px; color: var(--text-2); font-size: 0.7rem;
        }
        .link-textarea {
            width: 100%; padding: 0.625rem 0.75rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 0.375rem; color: var(--text);
            font-family: monospace; font-size: 0.75rem; resize: vertical;
            outline: none; transition: border-color 0.15s;
        }
        .link-textarea:focus { border-color: var(--accent); }

        /* ── Wide overlay (info panel) ───────────────────────────────────── */

        .overlay-wide { width: min(640px, calc(100vw - 2rem)); }

        /* ── Piece map ───────────────────────────────────────────────────── */

        .piece-map-wrap { margin-top: 1rem; }
        .piece-map {
            display: flex; gap: 1px;
            height: 16px; margin-top: 0.375rem;
            border-radius: 0.25rem; overflow: hidden;
            background: var(--bg);
        }
        .piece-seg { flex: 1 1 0; min-width: 0; }
        .piece-done     { background: #22c55e; }
        .piece-inflight { background: #facc15; }
        .piece-partial  { background: #15803d; }
        .piece-pending  { background: var(--border); }
        .piece-missing  { background: #ef4444; }
        .piece-map-empty { margin-top: 0.375rem; font-size: 0.75rem; color: var(--text-4); }
        .piece-avail { margin-top: 0.375rem; font-size: 0.75rem; }
        .piece-avail-full    { color: #22c55e; }
        .piece-avail-partial { color: #ef4444; }

        /* ── Filter / status bar ────────────────────────────────────────── */

        .dl-statusbar {
            display: flex; align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        /* Speeds sit on the right on desktop; margin-auto pushes them there
           so the select/input/count stay grouped on the left. */
        .dl-speeds { display: flex; align-items: center; gap: 0.75rem; }
        /* Right-hand group: speed meters + the temp-limit button, pushed right. */
        .dl-status-right { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }

        .dl-filter-select {
            padding: 0.25rem 0.5rem;
            background: var(--raised); border: 1px solid var(--border);
            border-radius: 0.25rem; color: var(--text);
            font-size: 0.75rem; font-family: inherit; cursor: pointer;
            /* Cap the width so an absurdly long category name can't blow up the
               control; the selected label is clipped instead. 8rem fits one or
               two words and keeps the bar visually tidy. */
            max-width: 8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .dl-filter-input {
            padding: 0.25rem 0.5rem;
            background: var(--raised); border: 1px solid var(--border);
            border-radius: 0.25rem; color: var(--text);
            font-size: 0.75rem; font-family: inherit; outline: none;
            width: 160px; transition: border-color 0.15s;
        }
        .dl-filter-input:focus { border-color: var(--accent); }
        .dl-filter-input::placeholder { color: var(--text-4); }

        .dl-active-count {
            font-size: 0.75rem; color: var(--sa-fg);
            background: var(--sa); padding: 0.1rem 0.45rem;
            border-radius: 9999px; font-weight: 600; white-space: nowrap;
        }
        /* Idle state: neutral text instead of a coloured pill, so a count of
           zero never reads as activity while the layout stays put. */
        .dl-active-none {
            color: var(--text-4); background: transparent;
            font-weight: 400; padding-left: 0;
        }
        .dl-speed { font-size: 0.75rem; font-weight: 500; white-space: nowrap; }
        .dl-speed-down { color: var(--sa-fg); }
        .dl-speed-up   { color: var(--sd-fg); }
        .dl-speed-idle { font-size: 0.75rem; color: var(--text-4); }

        /* Temporary speed-limit toggle button (right of the speed meters). */
        .dl-limit-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.2rem; background: transparent; border: none;
            color: var(--text-4); cursor: pointer; border-radius: 0.25rem;
            transition: color 0.1s, background 0.1s;
        }
        .dl-limit-btn:hover { background: var(--row-hover); color: var(--text-2); }
        .dl-limit-btn .icon { width: 1.125rem; height: 1.125rem; }
        /* Engaged: filled accent badge so the slow mode is unmistakably active. */
        .dl-limit-on, .dl-limit-on:hover {
            background: var(--accent); color: var(--accent-fg);
        }

        /* Mobile: two purposeful rows via grid, but only for the downloads
           footer (the one carrying the filter controls). The simpler footers
           on the other tabs — just a count + the global meters — keep the base
           flex layout, which already wraps cleanly. Scoped via :has() so an
           empty filter row never appears on those tabs. Declared after the base
           rules so it wins the cascade at ≤540px. */
        /* Intermediate tier: two rows. Row 1 carries both selects (natural
           width, 8rem cap kept) plus the text filter; row 2 the count + speeds.
           This is the original mobile model, restored for the wider phones. */
        @media (max-width: 640px) {
            .dl-statusbar:has(.dl-filter-select) {
                display: grid;
                grid-template-columns: auto auto 1fr;
                gap: 0.5rem; padding: 0.5rem 1rem;
            }
            .dl-statusbar:has(.dl-filter-select) .dl-filter-select { grid-row: 1; min-width: 0; }
            .dl-statusbar:has(.dl-filter-select) .dl-filter-select:nth-of-type(1) { grid-column: 1; }
            /* Absent category select leaves col 2 empty; an auto track with no
               content collapses, so the input still butts up to the status one. */
            .dl-statusbar:has(.dl-filter-select) .dl-filter-select:nth-of-type(2) { grid-column: 2; }
            .dl-statusbar:has(.dl-filter-select) .dl-filter-input  { grid-row: 1; grid-column: 3; width: auto; min-width: 0; }
            /* Row 2 spans all columns so its text width never widens a track. */
            .dl-statusbar:has(.dl-filter-select) .dl-active-count  { grid-row: 2; grid-column: 1 / -1; justify-self: start; }
            .dl-statusbar:has(.dl-filter-select) .dl-status-right  { grid-row: 2; grid-column: 1 / -1; justify-self: end; margin-left: 0; }
            /* Tighter badge cap on narrow screens so it leaves room for name+size. */
            .dl-cat-badge { max-width: 6rem; }
        }

        /* Narrowest tier: three rows. The selects no longer share a row with the
           text filter — they sit side by side filling half each (cap lifted),
           the filter drops to its own full-width row, count + speeds to a third. */
        @media (max-width: 400px) {
            .dl-statusbar:has(.dl-filter-select) {
                grid-template-columns: 1fr 1fr;
            }
            .dl-statusbar:has(.dl-filter-select) .dl-filter-select { max-width: none; }
            .dl-statusbar:has(.dl-filter-select) .dl-filter-input  { grid-row: 2; grid-column: 1 / -1; }
            .dl-statusbar:has(.dl-filter-select) .dl-active-count  { grid-row: 3; grid-column: 1; }
            .dl-statusbar:has(.dl-filter-select) .dl-status-right  { grid-row: 3; grid-column: 2; }
        }

        /* ── Downloads ───────────────────────────────────────────────────── */

        .dl-list { list-style: none; display: flex; flex-direction: column; gap: 0; }

        .dl-row {
            padding: 0.875rem 0.5rem;
            border-bottom: 1px solid var(--raised);
            cursor: pointer; border-radius: 0.25rem;
            transition: background 0.1s;
            /* Don't let shift+click range selection highlight page text. */
            user-select: none; -webkit-user-select: none;
        }
        .dl-row:hover { background: var(--row-hover); }
        .dl-row-selected { background: var(--row-sel) !important; }
        .dl-row:last-child { border-bottom: none; }

        .dl-top {
            display: flex; justify-content: space-between;
            align-items: baseline; gap: 1rem; margin-bottom: 0.375rem;
        }
        .dl-name {
            font-size: 0.875rem; font-weight: 500; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            min-width: 0;
        }
        .dl-size { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; }
        /* Category badge: sits next to the name; margin-right:auto pushes the
           size to the far right. Background/colour come from an inline style
           when the category has a colour; otherwise this neutral default. */
        .dl-cat-badge {
            flex: none; margin-right: auto;
            padding: 0.05rem 0.45rem; border-radius: 9999px;
            font-size: 0.65rem; font-weight: 600; white-space: nowrap;
            background: var(--sn); color: var(--text-2);
            /* Clip an over-long category name so the badge can't grow unbounded. */
            max-width: 10rem; overflow: hidden; text-overflow: ellipsis;
        }

        .dl-bar-track {
            height: 4px; background: var(--bar-track); border-radius: 2px;
            margin-bottom: 0.5rem; overflow: hidden;
        }
        .dl-bar-fill {
            height: 100%; background: var(--accent);
            border-radius: 2px; transition: width 0.4s ease;
        }

        .dl-bottom {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
        }
        .dl-state {
            display: inline-block; padding: 0.125rem 0.5rem;
            border-radius: 9999px; font-size: 0.6875rem; font-weight: 600;
        }
        .dl-state-active  { background: var(--sa); color: var(--sa-fg); }
        .dl-state-done    { background: var(--sd); color: var(--sd-fg); }
        .dl-state-failed  { background: var(--sf); color: var(--sf-fg); }
        .dl-state-stalled { background: var(--st); color: var(--st-fg); }
        .dl-state-paused  { background: var(--sp); color: var(--sp-fg); }
        .dl-state-neutral { background: var(--sn); color: var(--sn-fg); }

        .dl-error { font-size: 0.75rem; color: var(--sf-fg); }
        .dl-actions { margin-left: auto; display: flex; gap: 0.5rem; }

        /* ── Uploads ─────────────────────────────────────────────────────── */

        /* Mirror of the downloads list for the other direction: peers pulling
           data from us. One row per active upload, no selection. */
        .ul-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
        .ul-row {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--raised);
        }
        .ul-row:last-child { border-bottom: none; }

        .ul-badge {
            display: inline-block; padding: 0.1rem 0.4rem;
            border-radius: 4px; font-size: 0.625rem; font-weight: 700;
            letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
        }
        .ul-badge-rucio { background: var(--sa); color: var(--sa-fg); }
        .ul-badge-emule { background: var(--st); color: var(--st-fg); }

        .ul-main { display: flex; flex-direction: column; gap: 0.125rem; min-width: 0; flex: 1; }
        .ul-name {
            font-size: 0.875rem; font-weight: 500; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ul-peer {
            font-size: 0.6875rem; color: var(--text-4);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-variant-numeric: tabular-nums;
        }
        .ul-sent {
            font-size: 0.75rem; color: var(--text-3); white-space: nowrap;
            font-variant-numeric: tabular-nums; text-align: right;
        }
        .ul-rate {
            font-size: 0.8125rem; font-weight: 600; color: var(--sd-fg);
            white-space: nowrap; font-variant-numeric: tabular-nums;
            min-width: 5rem; text-align: right;
        }

        /* ── Searches ────────────────────────────────────────────────────── */

        /* Mirrors .dl-toolbar so the Searches header matches Downloads/Shares:
           a header row with a light divider below it. */
        .search-bar {
            display: flex; gap: 0.75rem;
            padding-bottom: 0.875rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }
        .search-input {
            flex: 1; padding: 0.5rem 0.875rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.375rem; color: var(--text);
            font-size: 0.875rem; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-4); }

        .search-btn {
            padding: 0.5rem 1.25rem;
            background: var(--accent); color: var(--accent-fg);
            border: none; border-radius: 0.375rem;
            font-size: 0.875rem; font-weight: 600; font-family: inherit;
            cursor: pointer; white-space: nowrap; transition: background 0.15s;
        }
        .search-btn:hover:not(:disabled) { background: var(--accent-2); }
        .search-btn:disabled { opacity: 0.6; cursor: default; }

        /* Recent-search selector + actions, below the search bar. The negative
           top margin cancels the tab-toolbar's bottom padding (0.875rem) that
           would otherwise stack above this row, so its 0.5rem padding reads the
           same above and below. */
        .search-history {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1.5rem; border-bottom: 1px solid var(--border);
            background: var(--surface); flex-shrink: 0;
            margin-top: -0.875rem;
        }
        /* Custom recent-search dropdown. Replaces a native <select> so the
           option highlight reliably fills the full row width on every browser
           (Firefox/Linux clips the native highlight to the content width). */
        .history-dd { position: relative; flex: 1; min-width: 0; }
        .history-dd-btn {
            width: 100%; display: flex; align-items: center; gap: 0.5rem;
            padding: 0.3rem 0.5rem; background: var(--raised);
            border: 1px solid var(--border); border-radius: 0.25rem;
            color: var(--text); font-size: 0.8125rem; font-family: inherit;
            cursor: pointer; text-align: left;
        }
        .history-dd-label {
            flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .history-dd-btn .icon { width: 1rem; height: 1rem; color: var(--text-3); flex-shrink: 0; }
        /* Catches clicks anywhere outside the menu to dismiss it. */
        .history-dd-backdrop { position: fixed; inset: 0; z-index: 50; }
        .history-dd-menu {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 51;
            list-style: none; padding: 0.25rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.375rem; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            max-height: 320px; overflow-y: auto;
        }
        .history-dd-item {
            padding: 0.4rem 0.6rem; border-radius: 0.25rem;
            font-size: 0.8125rem; color: var(--text); cursor: pointer;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .history-dd-item:hover { background: var(--row-hover); }
        .history-dd-item-sel { background: var(--row-sel); }
        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.35rem; background: transparent; border: 1px solid var(--border);
            border-radius: 0.25rem; color: var(--text-3); cursor: pointer;
            transition: color 0.1s, background 0.1s;
        }
        .icon-btn .icon { width: 1rem; height: 1rem; }
        .icon-btn:hover:not(:disabled) { background: var(--row-hover); color: var(--text); }
        .icon-btn:disabled { opacity: 0.4; cursor: default; }
        .icon-btn-danger:hover:not(:disabled) { color: var(--sf-fg); }

        /* Result filter/sort controls, between the history row and the list. */
        .search-filter-bar {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1.5rem; flex-shrink: 0;
        }
        .search-filter-bar .dl-filter-input { flex: 1; width: auto; }

        .results-header {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.75rem; color: var(--text-3);
        }

        /* One grid for the whole list (not per-row) so every column is sized to
           its widest cell across all rows and stays aligned — the count column
           is then exactly as wide as the largest count, with no fixed padding.
           Rows are subgrids so they keep their own box (border, hover, padding). */
        .results-list {
            list-style: none; display: grid;
            /* Last track holds the action button / status label, right-aligned;
               sized to fit the widest label ("In downloads") with little slack
               so the number→button gap doesn't dwarf the badge→number one. */
            grid-template-columns: 1fr auto auto auto 5.5rem;
            column-gap: 1rem;
        }

        .result-row {
            display: grid;
            grid-template-columns: subgrid;
            grid-column: 1 / -1;
            align-items: center;
            padding: 0.625rem 0;
            border-bottom: 1px solid var(--raised);
        }
        /* Fixed-width, right-aligned action cell so the row layout doesn't
           shift when the button is replaced by a status label. */
        .result-action {
            display: flex; align-items: center; justify-content: flex-end;
        }
        .result-row:last-child { border-bottom: none; }

        .result-name {
            font-size: 0.8125rem; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            min-width: 0;
        }
        .result-size { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; }
        /* Peer/source count for Rucio results (empty for eMule). */
        .result-peers {

        @media (max-width: 640px) {

        .empty-searching { flex-direction: column; gap: 0.75rem; }
        /* Inline spinner next to the result count while more results stream in. */
        .results-searching {

        /* ── Shares ──────────────────────────────────────────────────────── */

        .share-indexing {

        .share-badge {
            font-size: 0.625rem; font-weight: 700; letter-spacing: 0.03em;

            padding: 0.1rem 0.45rem; border-radius: 9999px; white-space: nowrap;

        /* Pin state pill (Pins tab): green when present, blue while fetching,
           neutral grey when pinned-but-absent. Uses the theme status vars so it

        .pin-state {
            font-size: 0.625rem; font-weight: 700; letter-spacing: 0.03em;

        .pin-state-missing   { background: var(--sn); color: var(--sn-fg); }
        /* Pin and subscription rows aren't clickable as a whole (only their
           pills/buttons are), so keep the text cursor, allow selecting the
           name/hash to copy, and drop the row hover tint — consistent with the
           static file rows (.share-file-row). */
        .static-row { cursor: default; user-select: text; -webkit-user-select: text; }
        .static-row:hover { background: transparent; }
        /* Right-hand block of a pin row: collection pill over state badge,

        .pin-side {
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 0.25rem; flex: none;
        }
        /* Clickable collection label; opens the change-collection modal. */
        .pin-collection-pill {
            font-size: 0.6875rem; font-weight: 600; max-width: 11rem;
            padding: 0.15rem 0.55rem; border-radius: 9999px; cursor: pointer;
            border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

        .pin-collection-pill:hover { border-color: var(--accent); color: var(--accent); }
        .pin-collection-pill-empty { color: var(--text-4); font-weight: 500; }

        /* Subscription storage meter: the used/quota bar under the peer id. */
        /* Two-tone subscription meter: lighter = committed (selected within

        .sub-meter { margin: 0.35rem 0; width: 100%; position: relative; }
        .sub-meter-committed {
            position: absolute; left: 0; top: 0; height: 100%;
            background: var(--accent); opacity: 0.3;
            border-radius: 2px; transition: width 0.4s ease;
        }
        .sub-meter .dl-bar-fill { position: absolute; left: 0; top: 0; }

        /* Subscription info modal: peer id, info lines, file list + state pills. */
        .modal-wide { width: 620px; }
        .sub-info-peer {
            font-size: 0.75rem; color: var(--text-2); word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .sub-info-line { font-size: 0.8125rem; color: var(--text-2); }
        .unsub-choices {
            margin: 0.5rem 0 0; padding-left: 1.1rem;
            font-size: 0.8125rem; color: var(--text-2);
            display: flex; flex-direction: column; gap: 0.45rem;
        }
        .unsub-choices strong { color: var(--text); }
        /* Collection scope editor (which of a peer's collections to mirror). */
        .sub-scope {
            display: flex; flex-direction: column; gap: 0.5rem;
            margin: 0.75rem 0; padding: 0.75rem;
            border: 1px solid var(--border); border-radius: 0.375rem;
        }
        .sub-scope-all { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem; }
        .sub-scope-list {
            display: flex; flex-wrap: wrap; gap: 0.375rem 1rem;
            padding-left: 1.5rem;
        }
        .sub-scope-item {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.8125rem; color: var(--text-2);
        }
        .sub-file-list { max-height: 50vh; overflow-y: auto; }
        .mirror-state {
            font-size: 0.625rem; font-weight: 700; letter-spacing: 0.03em;
            padding: 0.1rem 0.45rem; border-radius: 9999px; white-space: nowrap;
            background: var(--sn); color: var(--sn-fg);
        }
        .mirror-state-present  { background: var(--sd); color: var(--sd-fg); }
        .mirror-state-fetching { background: var(--sa); color: var(--sa-fg); }
        .mirror-state-missing  { background: var(--sn); color: var(--sn-fg); }
        .mirror-state-skipped  { background: var(--sn); color: var(--sn-fg); }
        /* Quota input + unit selector row in the subscribe modal. */
        .sub-quota-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        /* min-width:0 lets the number input shrink below its intrinsic width
           (~248px) instead of overflowing the row on small screens. */
        .sub-quota-row .search-input { flex: 1 1 6rem; min-width: 0; }
        .sub-unit { width: auto; flex: 0 0 auto; }

        .share-file-row {
            display: grid; grid-template-columns: 1fr auto auto auto;
            align-items: center; gap: 0.75rem;
            padding: 0.5rem 0; border-bottom: 1px solid var(--raised);
        }
        .share-file-row:last-child { border-bottom: none; }
        .share-file-name {
            font-size: 0.8125rem; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;

        .share-file-size { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; }
        .share-copy-btn {
            display: inline-flex; align-items: center; gap: 0.3rem; white-space: nowrap;
        }
        .share-copy-btn .icon { width: 0.875rem; height: 0.875rem; }
        /* Fixed width for the Pin/Unpin toggle so the label (Pin/Pinned!/Unpin)

        .share-pin-btn { min-width: 5.5rem; justify-content: center; }

        /* "Load more" button for the paginated shared-files list. */
        .share-load-more {
            display: block; margin: 0.75rem auto; padding: 0.4rem 1rem;
            background: var(--raised); border: 1px solid var(--border);
            border-radius: 0.375rem; color: var(--text-2);
            font-size: 0.8125rem; font-family: inherit; cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .share-load-more:hover:not(:disabled) { background: var(--row-hover); color: var(--text); }
        .share-load-more:disabled { opacity: 0.6; cursor: default; }

        /* ── Shared atoms ────────────────────────────────────────────────── */

        .empty-state {
            display: flex; flex-direction: column; gap: 0.35rem;
            align-items: center; justify-content: center;
            height: 240px; color: var(--text-4); font-size: 0.875rem;
            text-align: center; padding: 0 1rem;
        }
        /* Secondary line under an empty-state heading (e.g. the Pins tab). */
        .empty-hint { font-size: 0.75rem; color: var(--text-4); opacity: 0.8; }

        .btn-sm {
            padding: 0.25rem 0.625rem; border-radius: 0.25rem;
            font-size: 0.75rem; font-family: inherit; cursor: pointer;
            border: 1px solid var(--border); background: var(--raised); color: var(--text-2);
            transition: background 0.1s;
        }
        .btn-sm:hover { background: var(--border); color: var(--text); }
        .btn-primary { background: var(--sa); border-color: var(--sa-fg); color: var(--sa-fg); }
        .btn-primary:hover { opacity: 0.85; }
        .btn-danger { border-color: var(--sf); color: var(--sf-fg); }
        .btn-danger:hover { background: var(--sf); }

        .mono {
            font-family: 'Cascadia Code', 'JetBrains Mono', monospace;
            font-size: 0.6875rem; word-break: break-all; color: var(--mono);
        }

        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
        .badge-high    { background: var(--sd); color: var(--sd-fg); }
        .badge-low     { background: var(--st); color: var(--st-fg); }
        .badge-unknown { background: var(--sn); color: var(--sn-fg); }

        .muted { color: var(--text-3); font-style: italic; }
        .loading { color: var(--text-3); font-size: 0.8125rem; padding: 1rem 0; }
        .error-msg { color: var(--sf-fg); font-size: 0.8125rem; }
    </style>
    <script>
        // Apply stored theme before first paint to prevent flash of wrong theme.
        (function () {
            try {
                var t = localStorage.getItem('rucio-theme');
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
                else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
                // 'auto' or missing → no attribute; CSS media query handles it.
            } catch (_) {}
        })();
    </script>
</head>
