<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Rucio</title>
    <link data-trunk rel="rust"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; }
        .layout { display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.5rem; background: #1a1a2e; border-bottom: 1px solid #2d2d4e; }
        .brand { font-size: 1.125rem; font-weight: 700; letter-spacing: 0.05em; color: #7c93f0; }
        .btn { padding: 0.375rem 0.875rem; background: #2d2d4e; color: #e2e8f0; border: 1px solid #3d3d6e; border-radius: 0.375rem; cursor: pointer; font-size: 0.8125rem; }
        .btn:hover { background: #3d3d6e; }
        .content { padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 1rem; align-items: start; }
        .card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 0.5rem; padding: 1.25rem; }
        .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: #64748b; margin-bottom: 1rem; }
        .card-subtitle { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; margin: 0.875rem 0 0.375rem; }
        dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.5rem 1.25rem; align-items: baseline; }
        dt { color: #94a3b8; font-size: 0.8125rem; white-space: nowrap; }
        dd { font-size: 0.8125rem; }
        .mono { font-family: 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 0.75rem; word-break: break-all; color: #cbd5e1; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
        .badge-high    { background: #14532d; color: #86efac; }
        .badge-low     { background: #7c2d12; color: #fdba74; }
        .badge-unknown { background: #1e293b; color: #94a3b8; }
        .addr-list { list-style: none; display: flex; flex-direction: column; gap: 0.25rem; }
        .addr-list li { font-family: monospace; font-size: 0.6875rem; color: #94a3b8; background: #0f0f1a; padding: 0.25rem 0.5rem; border-radius: 0.25rem; word-break: break-all; }
        .muted { color: #475569; font-style: italic; font-size: 0.8125rem; }
        .loading { color: #94a3b8; padding: 3rem; text-align: center; font-size: 0.875rem; }
        .error-msg { color: #f87171; padding: 1rem; font-size: 0.875rem; }
    </style>
</head>
<body></body>
</html>
