<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Rucio</title>
    <link data-trunk rel="rust"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Layout ─────────────────────────────────────────────────────── */

        .layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Topbar ─────────────────────────────────────────────────────── */

        .topbar {
            display: flex;
            align-items: stretch;
            height: 48px;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d4e;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            padding: 0 1.25rem 0 1.5rem;
            font-size: 1.0625rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #7c93f0;
            white-space: nowrap;
        }

        /* ── Tabs ───────────────────────────────────────────────────────── */

        .tabs {
            display: flex;
            align-items: stretch;
            flex: 1;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 0 1.125rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #64748b;
            cursor: pointer;
            font-size: 0.8125rem;
            font-family: inherit;
            transition: color 0.15s;
            white-space: nowrap;
        }

        .tab:hover { color: #94a3b8; }

        .tab.active {
            color: #e2e8f0;
            border-bottom-color: #7c93f0;
        }

        /* ── Menu ───────────────────────────────────────────────────────── */

        .menu-wrap {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 1rem;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.375rem;
            line-height: 1;
            padding: 0.25rem 0.375rem;
            font-family: inherit;
            transition: color 0.15s;
        }

        .menu-btn:hover { color: #e2e8f0; }

        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            right: 0.75rem;
            background: #1e2235;
            border: 1px solid #2d2d4e;
            border-radius: 0.5rem;
            min-width: 168px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .dropdown-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.625rem 1rem;
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 0.8125rem;
            font-family: inherit;
            transition: background 0.1s;
        }

        .dropdown-item:hover { background: #2d2d4e; color: #e2e8f0; }

        .dropdown-sep {
            height: 1px;
            background: #2d2d4e;
            margin: 0.25rem 0;
        }

        /* ── Main content ───────────────────────────────────────────────── */

        .content {
            flex: 1;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 240px;
            color: #475569;
            font-size: 0.875rem;
        }

        /* ── Overlay ────────────────────────────────────────────────────── */

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
        }

        .overlay {
            position: fixed;
            top: 56px;
            right: 1rem;
            width: 400px;
            max-height: calc(100vh - 72px);
            overflow-y: auto;
            background: #1a1a2e;
            border: 1px solid #2d2d4e;
            border-radius: 0.5rem;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
            z-index: 201;
        }

        .overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid #2d2d4e;
        }

        .overlay-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .overlay-close {
            background: transparent;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0.125rem 0.25rem;
            font-family: inherit;
            transition: color 0.15s;
        }

        .overlay-close:hover { color: #e2e8f0; }

        .overlay-body {
            padding: 1rem 1.25rem;
        }

        /* ── Panel contents ─────────────────────────────────────────────── */

        .panel-dl {
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 0.5rem 1.25rem;
            align-items: baseline;
        }

        dt { color: #64748b; font-size: 0.8125rem; white-space: nowrap; }
        dd { font-size: 0.8125rem; }

        .section-label {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #475569;
            margin: 0.875rem 0 0.375rem;
        }

        .section-label:first-child { margin-top: 0; }

        .addr-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .addr-list li {
            font-family: monospace;
            font-size: 0.6875rem;
            color: #94a3b8;
            background: #0f0f1a;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            word-break: break-all;
        }

        /* ── Shared atoms ───────────────────────────────────────────────── */

        .mono {
            font-family: 'Cascadia Code', 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            word-break: break-all;
            color: #cbd5e1;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .badge-high    { background: #14532d; color: #86efac; }
        .badge-low     { background: #7c2d12; color: #fdba74; }
        .badge-unknown { background: #1e293b; color: #94a3b8; }

        .muted { color: #475569; font-style: italic; }

        .loading {
            color: #475569;
            font-size: 0.8125rem;
            padding: 1rem 0;
        }

        .error-msg { color: #f87171; font-size: 0.8125rem; }
    </style>
</head>
<body></body>
</html>
