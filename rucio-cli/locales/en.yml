  status:
    peer_id: "Peer ID"
    class: "Class"
    peers: "Peers"
    uptime: "Uptime"
    version: "Version"
    listening: "Listening"
    none_paren: "(none)"
    observed: "External (observed by peers):"
    connectivity: "Connectivity:"
    bootstrap_public: "Bootstrap multiaddrs (paste into another node's config.toml):"
    bootstrap_local: "Local bootstrap multiaddrs (LAN / same-machine only):"
    note_no_public: "Note: no public address detected. LAN peers discover this node automatically via mDNS."
    session_transfer: "Session transfer:"
    up_line: "↑ %{speed}/s  total %{total}  (%{chunks} chunks served)"
    down_line: "↓ %{speed}/s  total %{total}  (%{chunks} chunks, %{rejected} rejected)"
