  error: "Error: %{msg}"
  unknown: "(unknown)"
  none: "(none)"
  press_ctrl_c: "Press Ctrl-C to exit."
  daemon_disconnected: "Daemon disconnected."
  daemon_contact_error: "Error contacting daemon: %{msg}"
  ws_error: "WebSocket error: %{msg}"

category:
