# English — source locale and fallback for the Rucio CLI.
# Keys are grouped by command. Interpolation uses %{name} placeholders.
# Format: rust-i18n _version 1 (one file per language); Weblate-compatible
# monolingual YAML with the base file at locales/en.yml.
