name: Feature request
description: Suggest a new capability or an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the problem you're trying to solve,
        not only the solution — it helps weigh it against other approaches.

        Before submitting, please search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point behind the request.
      placeholder: |
        I'm always frustrated when ... / It's currently impossible to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen. Rough sketches and CLI/API shapes are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about or are using today.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Core P2P (DHT, discovery, transfers)
        - Web panel
        - CLI
        - Daemon / REST API
        - eMule / Kad2 compatibility
        - Bootstrap node / indexer
        - Packaging / containers / distribution
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, prior art in eMule/MLDonkey/other tools, mockups, etc.
