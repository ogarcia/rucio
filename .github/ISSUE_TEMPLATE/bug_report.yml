name: Bug report
description: Report something that is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the fields
        below — the version and install method in particular make most issues
        much faster to diagnose.

        Before submitting, please search existing issues to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: |
        When I ... I expected ... but instead ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact steps (commands, panel actions, links) that trigger it.
      placeholder: |
        1. Start the daemon with `ruciod`
        2. Run `rucio search add --wait "..."`
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `rucio --version` (or the image tag you pulled).
      placeholder: "rucio 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install rucio?
      options:
        - Container — latest (complete)
        - Container — latest-headless
        - Container — latest-cli
        - Container — latest-bootstrap
        - Release binary
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Where did you hit the bug?
      options:
        - Web panel
        - CLI
        - Daemon / REST API
        - Bootstrap node / indexer
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: emule
    attributes:
      label: Is eMule / Kad2 compatibility involved?
      description: i.e. was the build compiled with `emule-compat` and the bug touches Kad search or an ed2k:// download?
      options:
        - "No — native rucio only"
        - "Yes — Kad search / ed2k download"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: OS and architecture
      placeholder: "e.g. Linux x86_64, macOS aarch64, Debian 12 in Docker"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste daemon logs around the failure. Increasing verbosity helps:
        `RUST_LOG=debug ruciod` (or set the log level in the container env).
        This field is rendered as a code block — no backticks needed.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Config snippets, screenshots, network setup (NAT, reverse proxy), etc.
