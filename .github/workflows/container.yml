name: Container

on:
  push:
    branches: [master]
    # Bare semver tags: 0.1.0, 1.2.3-rc1 (no "v" prefix)
    tags: ["[0-9]*"]
  pull_request:
    paths:
      - "Containerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rucio-core/**"
      - "rucio-daemon/**"
      - "rucio-cli/**"
      - "rucio/**"
      - ".github/workflows/container.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── daemon-only image (tag: master / vX.Y.Z / latest) ─────────────────────
  ruciod:
    name: Build ruciod image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push → "master"
            type=ref,event=branch
            # PR → "pr-<N>"
            type=ref,event=pr
            # semver tag 0.1.0 → "0.1.0" and "0.1"
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # semver tag → "latest"
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push (ruciod stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          target: ruciod
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ruciod
          cache-to: type=gha,mode=max,scope=ruciod

  # ── full image (tag: master-full / vX.Y.Z-full / latest-full) ─────────────
  full:
    name: Build full image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push → "master-full"
            type=ref,event=branch,suffix=-full
            # PR → "pr-<N>-full"
            type=ref,event=pr,suffix=-full
            # semver tag 0.1.0 → "0.1.0-full" and "0.1-full"
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            # semver tag → "latest-full"
            type=raw,value=latest-full,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push (full stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          target: full
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
