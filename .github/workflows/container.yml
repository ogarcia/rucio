name: Container

on:
  push:
    branches: [master]
    # Bare semver tags: 0.1.0, 1.2.3-rc1 (no "v" prefix)
    tags: ["[0-9]*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
  pull_request:
    paths:
      - "Containerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rucio-core/**"
      - "rucio-net/**"
      - "rucio-daemon/**"
      - "rucio-cli/**"
      - "rucio-emule/**"
      - "rucio-bootstrap/**"
      - "rucio/**"
      - "rucio-web/**"
      - ".github/workflows/container.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Build-tool/base-image versions (TRUNK_VERSION, ALPINE_VERSION, …) come from
  # versions.env, loaded into $GITHUB_ENV by the "Load build versions" step in
  # each job below.

jobs:
  # ── Compile binaries once per arch (native runners) ────────────────────────
  build:
    name: Compile binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    # aarch64 musl is a cross build from the arm runner's gnu host, so ring
    # looks for aarch64-linux-musl-gcc (not shipped by musl-tools). Point its C
    # compiler and the linker at musl-gcc. These vars are target-scoped, so they
    # are inert for the x86_64 job.
    env:
      CC_aarch64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - arch: arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v7

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@${{ env.TRUNK_VERSION }}

      - name: Build Leptos frontend
        run: cd rucio-web && trunk build --release --public-url ./

      # Headless daemon (ruciod), bootstrap and the standalone CLI — no web
      # panel. rucio-cli is a workspace default-member, built by this command.
      - name: Build (headless + bootstrap + cli, no web-ui)
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            --features emule-compat,indexer
          mkdir -p dist/${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/ruciod          dist/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/rucio-bootstrap dist/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/rucio-cli       dist/${{ matrix.arch }}/
          strip dist/${{ matrix.arch }}/ruciod dist/${{ matrix.arch }}/rucio-bootstrap dist/${{ matrix.arch }}/rucio-cli

      # Recompile only the fat `rucio` with the embedded web panel — this is the
      # `complete`/latest image. Incremental over the build above.
      - name: Build (complete, web-ui)
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            -p rucio --features emule-compat,web-ui
          cp target/${{ matrix.target }}/release/rucio dist/${{ matrix.arch }}/rucio
          strip dist/${{ matrix.arch }}/rucio

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  # ── complete image (tag: master / 0.1.0 / latest) ────────────────────────
  image-complete:
    name: Build complete image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      # QEMU lets buildx run the emulated bits of the non-native platform — here
      # only the runtime stage's `apk add`/`adduser` (a few seconds); the binaries
      # are pre-compiled, so nothing heavy runs under emulation.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          target: complete
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=complete
          cache-to: type=gha,mode=max,scope=complete

  # ── headless image (tag: master-headless / 0.1.0-headless / latest-headless)
  image-headless:
    name: Build headless image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      # QEMU lets buildx run the emulated bits of the non-native platform — here
      # only the runtime stage's `apk add`/`adduser` (a few seconds); the binaries
      # are pre-compiled, so nothing heavy runs under emulation.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-headless
            type=ref,event=pr,suffix=-headless
            type=semver,pattern={{version}},suffix=-headless
            type=semver,pattern={{major}}.{{minor}},suffix=-headless
            type=raw,value=latest-headless,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          target: headless
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=headless
          cache-to: type=gha,mode=max,scope=headless

  # ── cli image (tag: master-cli / 0.1.0-cli / latest-cli) ──────────────────
  image-cli:
    name: Build cli image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      # QEMU lets buildx run the emulated bits of the non-native platform — here
      # only the runtime stage's `apk add`/`adduser` (a few seconds); the binaries
      # are pre-compiled, so nothing heavy runs under emulation.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-cli
            type=ref,event=pr,suffix=-cli
            type=semver,pattern={{version}},suffix=-cli
            type=semver,pattern={{major}}.{{minor}},suffix=-cli
            type=raw,value=latest-cli,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          target: cli
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cli
          cache-to: type=gha,mode=max,scope=cli

  # ── bootstrap image (tag: master-bootstrap / 0.1.0-bootstrap / latest-bootstrap)
  image-bootstrap:
    name: Build bootstrap image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      # QEMU lets buildx run the emulated bits of the non-native platform — here
      # only the runtime stage's `apk add`/`adduser` (a few seconds); the binaries
      # are pre-compiled, so nothing heavy runs under emulation.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-bootstrap
            type=ref,event=pr,suffix=-bootstrap
            type=semver,pattern={{version}},suffix=-bootstrap
            type=semver,pattern={{major}}.{{minor}},suffix=-bootstrap
            type=raw,value=latest-bootstrap,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          target: bootstrap
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bootstrap
          cache-to: type=gha,mode=max,scope=bootstrap
