name: Container

on:
  push:
    branches: [master]
    # Bare semver tags: 0.1.0, 1.2.3-rc1 (no "v" prefix)
    tags: ["[0-9]*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
  pull_request:
    paths:
      - "Containerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rucio-core/**"
      - "rucio-net/**"
      - "rucio-daemon/**"
      - "rucio-cli/**"
      - "rucio-emule/**"
      - "rucio-bootstrap/**"
      - "rucio/**"
      - "rucio-web/**"
      - ".github/workflows/container.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Build-tool/base-image versions (TRUNK_VERSION, ALPINE_VERSION, …) come from
  # versions.env, loaded into $GITHUB_ENV by the "Load build versions" step in
  # each job below.

jobs:
  # ── Compile binaries once ──────────────────────────────────────────────────
  build:
    name: Compile binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Install trunk
        run: |
          curl -sSLo trunk.tar.gz \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf trunk.tar.gz
          sudo mv trunk /usr/local/bin/

      - name: Build Leptos frontend
        run: cd rucio-web && trunk build --release

      # Headless daemon (ruciod), bootstrap and the standalone CLI — no web
      # panel. rucio-cli is a workspace default-member, built by this command.
      - name: Build (headless + bootstrap + cli, no web-ui)
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl \
            --features emule-compat,indexer
          mkdir dist
          cp target/x86_64-unknown-linux-musl/release/ruciod          dist/
          cp target/x86_64-unknown-linux-musl/release/rucio-bootstrap dist/
          cp target/x86_64-unknown-linux-musl/release/rucio-cli       dist/
          strip dist/ruciod dist/rucio-bootstrap dist/rucio-cli

      # Recompile only the fat `rucio` with the embedded web panel — this is the
      # `complete`/latest image. Incremental over the build above.
      - name: Build (complete, web-ui)
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl \
            -p rucio --features emule-compat,web-ui
          cp target/x86_64-unknown-linux-musl/release/rucio dist/rucio
          strip dist/rucio

      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/
          retention-days: 1

  # ── complete image (tag: master / 0.1.0 / latest) ────────────────────────
  image-complete:
    name: Build complete image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v7
        with:
          name: binaries
          path: dist/

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: complete
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=complete
          cache-to: type=gha,mode=max,scope=complete

  # ── headless image (tag: master-headless / 0.1.0-headless / latest-headless)
  image-headless:
    name: Build headless image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v7
        with:
          name: binaries
          path: dist/

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-headless
            type=ref,event=pr,suffix=-headless
            type=semver,pattern={{version}},suffix=-headless
            type=semver,pattern={{major}}.{{minor}},suffix=-headless
            type=raw,value=latest-headless,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: headless
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=headless
          cache-to: type=gha,mode=max,scope=headless

  # ── cli image (tag: master-cli / 0.1.0-cli / latest-cli) ──────────────────
  image-cli:
    name: Build cli image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v7
        with:
          name: binaries
          path: dist/

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-cli
            type=ref,event=pr,suffix=-cli
            type=semver,pattern={{version}},suffix=-cli
            type=semver,pattern={{major}}.{{minor}},suffix=-cli
            type=raw,value=latest-cli,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: cli
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cli
          cache-to: type=gha,mode=max,scope=cli

  # ── bootstrap image (tag: master-bootstrap / 0.1.0-bootstrap / latest-bootstrap)
  image-bootstrap:
    name: Build bootstrap image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load build versions
        shell: bash
        run: grep -E '^[A-Za-z_]+=' versions.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v7
        with:
          name: binaries
          path: dist/

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable metadata-action's automatic `latest=auto`: on a semver tag it
          # would make EVERY image (headless/cli/bootstrap too) also push the bare
          # `latest`, and the jobs race for it — so `latest` could end up the
          # headless image (no web). Only the complete job sets `latest`, via its
          # explicit `type=raw,value=latest` below.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-bootstrap
            type=ref,event=pr,suffix=-bootstrap
            type=semver,pattern={{version}},suffix=-bootstrap
            type=semver,pattern={{major}}.{{minor}},suffix=-bootstrap
            type=raw,value=latest-bootstrap,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: bootstrap
          build-args: |
            BUILDER=prebuilt
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bootstrap
          cache-to: type=gha,mode=max,scope=bootstrap
