name: Pages

# Publishes the static landing page in website/ to the gh-pages branch.
# One-time setup: repo Settings → Pages → Source = "Deploy from a branch",
# branch = gh-pages / (root).

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping deploys racing on the gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish website/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          publish_branch: gh-pages
